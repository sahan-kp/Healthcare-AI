<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        HealthCare AI
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<!-- LOADER -->

<div id="loader">

    <div class="pulse-container">

        <div class="pulse-circle"></div>

        <span class="medical-icon">
            ⚕️
        </span>

    </div>

    <div class="loader-text">

        AI DIAGNOSING...

    </div>

</div>

<!-- MAIN CONTENT -->

<div id="main-content">

    <!-- NAVBAR -->

    <nav class="navbar navbar-dark shadow-sm">

        <div class="container">

            <span class="navbar-brand fw-bold">

                🛡️ HEALTHCARE AI

            </span>

            <!-- HISTORY BUTTON -->

            <button class="btn btn-history"
                    onclick="openHistoryPopup()">

                📜 View History

            </button>

        </div>

    </nav>

    <!-- MAIN -->

    <div class="container py-5">

        <!-- AI RESULT -->

        <div id="ai-result-box"
             class="alert shadow-sm">

        </div>

        <!-- FORM + HISTORY -->

        <div class="row g-4">

            <!-- FORM -->

            <div class="col-lg-7">

                <div class="card main-card p-4">

                    <h3 class="text-center mb-4 fw-bold">

                        Patient Assessment Form

                    </h3>

                    <div class="row g-3">

                        <!-- NAME -->

                        <div class="col-md-6">

                            <label class="form-label">

                                Full Name

                            </label>

                            <input type="text"
                                   id="name"
                                   class="form-control">

                        </div>

                        <!-- EMAIL -->

                        <div class="col-md-6">

                            <label class="form-label">

                                Email

                            </label>

                            <input type="email"
                                   id="email"
                                   class="form-control">

                        </div>

                        <!-- AGE -->

                        <div class="col-md-4">

                            <label class="form-label">

                                Age

                            </label>

                            <input type="number"
                                   id="age"
                                   class="form-control">

                        </div>

                        <!-- BPM -->

                        <div class="col-md-4">

                            <label class="form-label">

                                BPM

                            </label>

                            <input type="number"
                                   id="heartRate"
                                   class="form-control">

                        </div>

                        <!-- BMI -->

                        <div class="col-md-4">

                            <label class="form-label">

                                BMI

                            </label>

                            <input type="text"
                                   id="bmi"
                                   class="form-control">

                        </div>

                        <!-- BP -->

                        <div class="col-md-6">

                            <label class="form-label">

                                Blood Pressure

                            </label>

                            <input type="text"
                                   id="bp"
                                   class="form-control">

                        </div>

                        <!-- SUGAR -->

                        <div class="col-md-6">

                            <label class="form-label">

                                Sugar

                            </label>

                            <input type="text"
                                   id="sugar"
                                   class="form-control">

                        </div>

                        <!-- SYMPTOMS -->

                        <div class="col-12">

                            <label class="form-label">

                                Symptoms

                            </label>

                            <textarea id="symptoms"
                                      rows="4"
                                      class="form-control"></textarea>

                        </div>

                        <!-- BUTTON -->

                        <div class="col-12">

                            <button onclick="processHealthCheck()"
                                    class="btn btn-predict w-100">

                                ANALYZE & SAVE RECORD

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- SIDE CARD -->

            <div class="col-lg-5">

                <div class="card main-card p-4">

                    <h4 class="fw-bold mb-3">

                        System Features

                    </h4>

                    <ul class="feature-list">

                        <li>✔ AI Disease Prediction</li>

                        <li>✔ Patient History</li>

                        <li>✔ Search Patients</li>

                        <li>✔ Edit Patient Records</li>

                        <li>✔ Delete Records</li>

                        <li>✔ Scrollable History Popup</li>

                    </ul>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- HISTORY POPUP -->

<div class="history-popup"
     id="historyPopup">

    <div class="history-box">

        <!-- TOP -->

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h3 class="fw-bold">

                📜 Patient History

            </h3>

            <button class="btn-close-history"
                    onclick="closeHistoryPopup()">

                ✖

            </button>

        </div>

        <!-- SEARCH -->

        <input type="text"
               id="searchText"
               class="form-control mb-4"
               placeholder="Search by Name or Email"
               onkeyup="searchUser()">

        <!-- USER LIST -->

        <div id="userList"></div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
