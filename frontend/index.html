<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HealthCare AI | Advanced Diagnostics</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS FILE -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- LOADER -->

<div id="loader">

    <div class="pulse-container">
        <div class="pulse-circle"></div>
        <span style="position:absolute; font-size:30px;">⚕️</span>
    </div>

    <div class="loader-text">
        AI DIAGNOSING...
    </div>

</div>

<!-- MAIN CONTENT -->

<div id="main-content">

    <nav class="navbar navbar-dark shadow-sm">

        <div class="container">

            <span class="navbar-brand mb-0 h1 fw-bold">
                🛡️ HEALTHCARE AI
            </span>

        </div>

    </nav>

    <div class="container py-5">

        <!-- AI RESULT -->

        <div id="ai-result-box" class="alert alert-info shadow-sm"></div>

        <!-- SEARCH -->

        <div class="mb-4">

            <input type="text"
                   id="searchText"
                   class="form-control"
                   placeholder="Search by Name or Email"
                   onkeyup="searchUser()">

        </div>

        <div class="row g-4">

            <!-- FORM -->

            <div class="col-lg-7">

                <div class="card main-card p-4">

                    <h3 class="mb-4 text-center fw-bold">
                        Patient Assessment Form
                    </h3>

                    <div class="row g-3">

                        <h6 class="section-title">
                            Personal Details
                        </h6>

                        <div class="col-md-6">

                            <label class="form-label fw-semibold">
                                Full Name
                            </label>

                            <input type="text"
                                   id="name"
                                   class="form-control">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label fw-semibold">
                                Email
                            </label>

                            <input type="email"
                                   id="email"
                                   class="form-control">

                        </div>

                        <div class="col-md-4">

                            <label class="form-label fw-semibold">
                                Age
                            </label>

                            <input type="number"
                                   id="age"
                                   class="form-control">

                        </div>

                        <div class="col-md-4">

                            <label class="form-label fw-semibold">
                                BPM
                            </label>

                            <input type="number"
                                   id="heartRate"
                                   class="form-control">

                        </div>

                        <div class="col-md-4">

                            <label class="form-label fw-semibold">
                                BMI
                            </label>

                            <input type="text"
                                   id="bmi"
                                   class="form-control">

                        </div>

                        <h6 class="section-title">
                            Clinical Vitals
                        </h6>

                        <div class="col-md-6">

                            <label class="form-label fw-semibold">
                                Blood Pressure
                            </label>

                            <input type="text"
                                   id="bp"
                                   class="form-control">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label fw-semibold">
                                Sugar
                            </label>

                            <input type="text"
                                   id="sugar"
                                   class="form-control">

                        </div>

                        <div class="col-12">

                            <label class="form-label fw-semibold">
                                Symptoms
                            </label>

                            <textarea id="symptoms"
                                      rows="4"
                                      class="form-control"></textarea>

                        </div>

                        <div class="col-12 mt-4">

                            <button onclick="processHealthCheck()"
                                    class="btn btn-predict w-100">

                                ANALYZE & SAVE RECORD

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- HISTORY -->

            <div class="col-lg-5">

                <div class="card main-card p-4">

                    <div class="d-flex justify-content-between align-items-center mb-4">

                        <h5 class="m-0 fw-bold">
                            Recent History
                        </h5>

                        <button onclick="loadUsers()"
                                class="btn btn-sm btn-light">

                            🔄

                        </button>

                    </div>

                    <div id="userList"></div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- JS FILE -->

<script src="script.js"></script>

</body>

</html>
