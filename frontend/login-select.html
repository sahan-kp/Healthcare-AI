<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>HealthCare AI | Advanced Diagnostics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0f172a;
            overflow:hidden;
            font-family:Segoe UI;
        }

        .bg-glow{
            position:absolute;
            width:500px;
            height:500px;
            background:#00d2ff;
            border-radius:50%;
            filter:blur(180px);
            opacity:0.2;
        }

        .card-box{
            position:relative;
            z-index:2;
            width:500px;
            padding:40px;
            border-radius:25px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(15px);
            box-shadow:0 0 30px rgba(0,210,255,0.2);
        }

        .title{
            color:white;
            text-align:center;
            margin-bottom:35px;
            font-weight:bold;
        }

        .role-btn{
            width:100%;
            height:65px;
            margin-bottom:20px;
            border:none;
            border-radius:15px;
            background:linear-gradient(45deg,#3a7bd5,#00d2ff);
            color:white;
            font-size:20px;
            font-weight:bold;
            transition:0.3s;
        }

        .role-btn:hover{
            transform:scale(1.03);
            box-shadow:0 0 20px rgba(0,210,255,0.4);
        }

        /* POPUP */

        .popup-bg{

            position:fixed;

            top:0;
            left:0;

            width:100%;
            height:100vh;

            background:rgba(0,0,0,0.7);

            display:none;

            justify-content:center;
            align-items:center;

            z-index:9999;
        }

        .popup-box{

            width:400px;

            padding:30px;

            border-radius:20px;

            background:#1e293b;

            box-shadow:0 0 25px rgba(0,210,255,0.3);
        }

        .popup-title{

            color:white;

            text-align:center;

            margin-bottom:20px;

            font-weight:bold;
        }

        .popup-input{

            width:100%;

            height:50px;

            border:none;

            border-radius:12px;

            padding-left:15px;

            margin-bottom:20px;
        }

        .popup-btn{

            width:100%;

            height:50px;

            border:none;

            border-radius:12px;

            background:linear-gradient(45deg,#3a7bd5,#00d2ff);

            color:white;

            font-size:18px;

            font-weight:bold;

            margin-bottom:10px;
        }

        .close-btn{

            background:red;
        }

    </style>

</head>

<body>

<div class="bg-glow"></div>

<div class="card-box">

    <h1 class="title">
        ⚕️ HEALTHCARE AI
    </h1>

    <!-- DOCTOR -->

    <button class="role-btn"
            onclick="openDoctorPopup()">

        Doctor Login

    </button>

    <!-- COUNTER -->

    <button class="role-btn"
            onclick="openCounterPopup()">

        Counter Login

    </button>

    <!-- OFFICE -->

    <button class="role-btn"
            onclick="openOfficePopup()">

        Office Login

    </button>

</div>

<!-- ===================================== -->
<!-- DOCTOR LOGIN POPUP -->
<!-- ===================================== -->

<div class="popup-bg"
     id="doctorPopup">

    <div class="popup-box">

        <h3 class="popup-title">
            👨‍⚕️ Doctor Login
        </h3>

        <input type="text"
               id="doctorUsername"
               class="popup-input"
               placeholder="Enter Username">

        <input type="password"
               id="doctorPassword"
               class="popup-input"
               placeholder="Enter Password">

        <button class="popup-btn"
                onclick="doctorLogin()">

            LOGIN

        </button>

        <button class="popup-btn close-btn"
                onclick="closeDoctorPopup()">

            CLOSE

        </button>

    </div>

</div>

<!-- ===================================== -->
<!-- COUNTER LOGIN POPUP -->
<!-- ===================================== -->

<div class="popup-bg"
     id="counterPopup">

    <div class="popup-box">

        <h3 class="popup-title">
            👨‍💼 Counter Login
        </h3>

        <input type="text"
               id="counterUsername"
               class="popup-input"
               placeholder="Enter Username">

        <input type="password"
               id="counterPassword"
               class="popup-input"
               placeholder="Enter Password">

        <button class="popup-btn"
                onclick="counterLogin()">

            LOGIN

        </button>

        <button class="popup-btn close-btn"
                onclick="closeCounterPopup()">

            CLOSE

        </button>

    </div>

</div>

<!-- ===================================== -->
<!-- OFFICE LOGIN POPUP -->
<!-- ===================================== -->

<div class="popup-bg"
     id="officePopup">

    <div class="popup-box">

        <h3 class="popup-title">
            🔐 Office Security Check
        </h3>

        <input type="password"
               id="officePassword"
               class="popup-input"
               placeholder="Enter Office Password">

        <button class="popup-btn"
                onclick="checkOfficePassword()">

            LOGIN

        </button>

        <button class="popup-btn close-btn"
                onclick="closeOfficePopup()">

            CLOSE

        </button>

    </div>

</div>

<script>

    // =====================================
    // DOCTOR POPUP
    // =====================================

    function openDoctorPopup(){

        document.getElementById("doctorPopup")
            .style.display = "flex";

    }

    function closeDoctorPopup(){

        document.getElementById("doctorPopup")
            .style.display = "none";

    }

    // DOCTOR LOGIN

    async function doctorLogin(){

        let username =
            document.getElementById("doctorUsername").value;

        let password =
            document.getElementById("doctorPassword").value;

        let loginData = {

            username: username,
            password: password,
            role: "DOCTOR"

        };

        try{

            const response = await fetch(

                "http://localhost:8080/auth/login",

                {

                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify(loginData)

                }

            );

            if(response.ok){

                alert("Doctor Login Success");

                window.location.href = "index.html";

            }

            else{

                alert("Invalid Doctor Username or Password");

            }

        }

        catch(error){

            console.log(error);

            alert("Server Error");

        }

    }

    // =====================================
    // COUNTER POPUP
    // =====================================

    function openCounterPopup(){

        document.getElementById("counterPopup")
            .style.display = "flex";

    }

    function closeCounterPopup(){

        document.getElementById("counterPopup")
            .style.display = "none";

    }

    // COUNTER LOGIN

    async function counterLogin(){

        let username =
            document.getElementById("counterUsername").value;

        let password =
            document.getElementById("counterPassword").value;

        let loginData = {

            username: username,
            password: password,
            role: "COUNTER"

        };

        try{

            const response = await fetch(

                "http://localhost:8080/auth/login",

                {

                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify(loginData)

                }

            );

            if(response.ok){

                alert("Counter Login Success");

                window.location.href = "counter.html";

            }

            else{

                alert("Invalid Counter Username or Password");

            }

        }

        catch(error){

            console.log(error);

            alert("Server Error");

        }

    }

    // =====================================
    // OFFICE POPUP
    // =====================================

    function openOfficePopup(){

        document.getElementById("officePopup")
            .style.display = "flex";

    }

    function closeOfficePopup(){

        document.getElementById("officePopup")
            .style.display = "none";

    }

    // OFFICE PASSWORD

    function checkOfficePassword(){

        let password =
            document.getElementById("officePassword").value;

        if(password === "1234"){

            alert("Office Login Success");

            window.location.href =
                "office-dashboard.html";

        }

        else{

            alert("Wrong Password!");

        }

    }

    // CLICK OUTSIDE CLOSE

    window.onclick = function(event){

        let doctorPopup =
            document.getElementById("doctorPopup");

        let counterPopup =
            document.getElementById("counterPopup");

        let officePopup =
            document.getElementById("officePopup");

        if(event.target === doctorPopup){

            doctorPopup.style.display = "none";

        }

        if(event.target === counterPopup){

            counterPopup.style.display = "none";

        }

        if(event.target === officePopup){

            officePopup.style.display = "none";

        }

    }

</script>

</body>
</html>
